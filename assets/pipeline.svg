<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 180" role="img" aria-label="Animated data pipeline: raw ops to decision output">
  <defs>
    <linearGradient id="flow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7C3AED"/>
      <stop offset="1" stop-color="#22D3EE"/>
    </linearGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="2.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect x="1" y="1" width="838" height="178" rx="14" fill="#0D1117" stroke="#1E293B"/>

  <!-- terminal caption -->
  <text x="34" y="42" font-family="ui-monospace, SFMono-Regular, monospace" font-size="12" fill="#475569" letter-spacing="3">DATA  PIPELINE</text>
  <rect x="166" y="32" width="8" height="12" fill="#22D3EE">
    <animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.5;0.5;1" dur="1.1s" repeatCount="indefinite"/>
  </rect>

  <!-- base rail -->
  <line x1="70" y1="98" x2="770" y2="98" stroke="#1E293B" stroke-width="2"/>
  <!-- flowing energy dash -->
  <line x1="70" y1="98" x2="770" y2="98" stroke="url(#flow)" stroke-width="2" stroke-dasharray="5 11" opacity="0.55">
    <animate attributeName="stroke-dashoffset" from="0" to="-32" dur="1.3s" repeatCount="indefinite"/>
  </line>

  <!-- travelling packets -->
  <circle r="3" fill="#7C3AED" filter="url(#glow)">
    <animateMotion dur="3.4s" repeatCount="indefinite" path="M70,98 H770"/>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.08;0.92;1" dur="3.4s" repeatCount="indefinite"/>
  </circle>
  <circle r="3" fill="#A78BFA" filter="url(#glow)">
    <animateMotion dur="3.4s" begin="-1.13s" repeatCount="indefinite" path="M70,98 H770"/>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.08;0.92;1" dur="3.4s" begin="-1.13s" repeatCount="indefinite"/>
  </circle>
  <circle r="3" fill="#22D3EE" filter="url(#glow)">
    <animateMotion dur="3.4s" begin="-2.26s" repeatCount="indefinite" path="M70,98 H770"/>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.08;0.92;1" dur="3.4s" begin="-2.26s" repeatCount="indefinite"/>
  </circle>

  <!-- node: raw -->
  <g>
    <circle cx="70" cy="98" r="7" fill="none" stroke="#7C3AED" stroke-width="1.5" opacity="0.6">
      <animate attributeName="r" values="7;15;7" dur="2.6s" begin="0s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;0;0.6" dur="2.6s" begin="0s" repeatCount="indefinite"/>
    </circle>
    <circle cx="70" cy="98" r="7" fill="#0D1117" stroke="#7C3AED" stroke-width="2"/>
    <text x="70" y="130" text-anchor="middle" font-family="ui-monospace, monospace" font-size="10" fill="#64748B">raw</text>
  </g>

  <!-- node: data -->
  <g>
    <circle cx="245" cy="98" r="7" fill="none" stroke="#7C3AED" stroke-width="1.5" opacity="0.6">
      <animate attributeName="r" values="7;15;7" dur="2.6s" begin="-0.55s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;0;0.6" dur="2.6s" begin="-0.55s" repeatCount="indefinite"/>
    </circle>
    <circle cx="245" cy="98" r="7" fill="#0D1117" stroke="#7C3AED" stroke-width="2"/>
    <text x="245" y="130" text-anchor="middle" font-family="ui-monospace, monospace" font-size="10" fill="#64748B">data</text>
  </g>

  <!-- node: core -->
  <g>
    <circle cx="420" cy="98" r="9" fill="none" stroke="#A78BFA" stroke-width="1.5" opacity="0.7">
      <animate attributeName="r" values="9;19;9" dur="2.6s" begin="-1.1s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.7;0;0.7" dur="2.6s" begin="-1.1s" repeatCount="indefinite"/>
    </circle>
    <circle cx="420" cy="98" r="9" fill="#0D1117" stroke="#A78BFA" stroke-width="2.5"/>
    <text x="420" y="132" text-anchor="middle" font-family="ui-monospace, monospace" font-size="10" fill="#94A3B8">core</text>
  </g>

  <!-- node: rag -->
  <g>
    <circle cx="595" cy="98" r="7" fill="none" stroke="#22D3EE" stroke-width="1.5" opacity="0.6">
      <animate attributeName="r" values="7;15;7" dur="2.6s" begin="-1.65s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;0;0.6" dur="2.6s" begin="-1.65s" repeatCount="indefinite"/>
    </circle>
    <circle cx="595" cy="98" r="7" fill="#0D1117" stroke="#22D3EE" stroke-width="2"/>
    <text x="595" y="130" text-anchor="middle" font-family="ui-monospace, monospace" font-size="10" fill="#64748B">rag</text>
  </g>

  <!-- node: out -->
  <g>
    <circle cx="770" cy="98" r="7" fill="none" stroke="#22D3EE" stroke-width="1.5" opacity="0.6">
      <animate attributeName="r" values="7;15;7" dur="2.6s" begin="-2.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;0;0.6" dur="2.6s" begin="-2.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="770" cy="98" r="7" fill="#0D1117" stroke="#22D3EE" stroke-width="2"/>
    <text x="770" y="130" text-anchor="middle" font-family="ui-monospace, monospace" font-size="10" fill="#64748B">out</text>
  </g>
</svg>
